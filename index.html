<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{background:#111;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
button{font-size:24px;padding:20px 40px;border-radius:12px;border:none;background:#f5e642;color:#111;font-weight:900;}
#log{font-size:14px;color:#0f0;white-space:pre;text-align:center;}
</style>
</head>
<body>
<div id="screen1">
  <p>画面1</p>
  <button onclick="go2()">スタート</button>
</div>
<div id="screen2" style="display:none">
  <p style="color:#f5e642;font-size:28px;font-weight:900">画面2に進みました！✅</p>
  <button onclick="go1()">戻る</button>
</div>
<div id="log">ログ:</div>
<script>
function log(msg){document.getElementById('log').textContent+= '\n'+msg;}
function go2(){
  log('go2() called');
  document.getElementById('screen1').style.display='none';
  document.getElementById('screen2').style.display='block';
  log('done');
}
function go1(){
  document.getElementById('screen2').style.display='none';
  document.getElementById('screen1').style.display='block';
  log('back to 1');
}
log('loaded');
</script>
</body>
</html>
